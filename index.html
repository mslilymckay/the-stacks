<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Tracker</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <script type="module" src="app.js" defer></script>
</head>
<body>
  <div class="botanical-frame top-left"></div>
  <div class="botanical-frame top-right"></div>

  <main class="bookshelf">
    <div class="current-read-section" id="current-read-section">
  <div class="book-cover active-read">
    <img src="https://placehold.co/150x200?text=Loading..." alt="Current Read" class="cover-image">
  </div>
  
  <div class="reader-animation">
    <img src="focus.gif" alt="Reading peacefully" class="reader-gif">
  </div>
</div>

<hr class="shelf-divider">
    <div class="book-grid" id="book-grid"></div>
  </main>

  <div class="bottom-sheet">
    <div class="sheet-handle"></div>
    <div class="card-content">
      <div class="card-hole"></div>
      <h2 class="book-title"></h2>
      <p class="book-author"></p>
      <div class="red-line"></div>
      <div class="blue-lines">
        <p class="metadata" data-field="category"></p>
        <p class="metadata" data-field="rating"></p>
        <p class="metadata" data-field="status"></p>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-item active">Library</button>
    <button class="nav-item">Search</button>
    <button class="nav-item">Focus</button>
  </nav>
</body>
</html>
