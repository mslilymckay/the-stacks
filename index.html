<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Stacks</title>
  <link rel="stylesheet" href="style.css?v=2">
  <link rel="icon" type="image/png" href="icon_small.png">
  <link rel="apple-touch-icon" href="icon_small.png">
  <link rel="manifest" href="manifest.json">
  <script type="module" src="app.js" defer></script>
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
</head>
<body>
  <header class="app-header">
    <div id="header-scroll-trigger" style="display: flex; align-items: center; gap: 10px; cursor: pointer; flex-grow: 1;">
      <img src="icon_small.png" alt="The Stacks Logo" class="header-logo" style="color: var(--header-text)">
      <h1 class="header-title">The Stacks</h1>
    </div>
    <div style="display: flex; gap: 15px; align-items: center;">
      <button id="feedback-trigger-btn" class="icon-action-btn" title="Send Feedback" style="background: transparent; border: none; padding: 0;">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
      </button>
    </div>
  </header>

  <div id="feedback-modal" class="feedback-modal hidden">
    <div class="feedback-content">
      <h3 style="font-family: 'Courier New'; color: var(--terracotta); margin-top: 0;">Feature Request</h3>
      <p style="font-size: 12px; color: var(--sage-green); margin-bottom: 15px;">What should we build next?</p>
      <textarea id="feedback-text" rows="4" class="card-input" placeholder="Type your ideas here..." style="width: 100%; resize: none; margin-bottom: 15px;"></textarea>
      <div style="display: flex; gap: 10px;">
        <button id="close-feedback-btn" class="card-btn" style="flex: 1; border-color: var(--detail-line); color: var(--sage-green);">Cancel</button>
        <button id="submit-feedback-btn" class="card-btn" style="flex: 1; background: var(--terracotta); border-color: var(--terracotta); color: var(--header-text);">Send</button>
      </div>
    </div>
  </div>

  <main class="bookshelf">
    
    <section id="view-library" class="page-view active">
      <div class="hero-wrapper">
        <h2 class="section-label" id="hero-label">Current Read</h2>
        <div class="current-read-section" id="current-read-section">
          
          <div class="carousel-container" id="active-reads-carousel">
            </div>
          
        </div>
      </div>

      <div style="padding: 15px 15px 10px 15px;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <h2 class="section-label" style="align: left;">
            Your Stacks
          </h2>
          <div class="layout-toggles" style="display: flex; gap: 10px;">
            <button class="layout-btn active" data-layout="layout-grid" title="3-Column Grid">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="4" height="4"></rect><rect x="10" y="3" width="4" height="4"></rect><rect x="17" y="3" width="4" height="4"></rect><rect x="3" y="10" width="4" height="4"></rect><rect x="10" y="10" width="4" height="4"></rect><rect x="17" y="10" width="4" height="4"></rect><rect x="3" y="17" width="4" height="4"></rect><rect x="10" y="17" width="4" height="4"></rect><rect x="17" y="17" width="4" height="4"></rect></svg>
            </button>
            <button class="layout-btn" data-layout="layout-cards" title="2-Column Cards">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
            </button>
            <button class="layout-btn" data-layout="layout-list" title="1-Column List">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
            </button>
          </div>
        </div>
        <div style="display: flex; align-items: left; margin-top: 5px; justify-content: left; gap: 10px;">
          <button id="wander-trigger-btn" title="Wander Stacks" class="wander">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="4" y="9" width="16" height="4" rx="1" transform="rotate(-12 12 11)" />
              <rect x="4" y="14" width="16" height="4" rx="1" />
              <rect x="4" y="4" width="16" height="4" rx="1" transform="rotate(8 12 6)" />
            </svg>
            <p id="library-subheading" style="font-family: 'Georgia', serif; font-size: 0.85rem; color: var(--header-text); margin: 0; font-style: italic;">
              All Books, by Title (A-Z)
            </p>
          </button>
        </div>
      </div>
      
      <div class="book-grid" id="book-grid">
        </div>
    </section>

    <section id="view-search" class="page-view">
      <div class="hero-wrapper">
        <h2 class="section-label">Find a Book</h2>
        <div class="search-form-container">
          <div class="search-radio-group">
            <label><input type="radio" name="search-type" value="intitle:" checked> Title</label>
            <label><input type="radio" name="search-type" value="inauthor:"> Author</label>
          </div>
          
          <div class="search-input-wrapper">
            <input type="text" id="search-input" placeholder="Search by title, author, or ISBN...">
            <button id="start-scan-btn" class="card-btn scan-btn" title="Scan Barcode">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7V5a2 2 0 0 1 2-2h2"></path><path d="M17 3h2a2 2 0 0 1 2 2v2"></path><path d="M21 17v2a2 2 0 0 1-2 2h-2"></path><path d="M7 21H5a2 2 0 0 1-2-2v-2"></path><rect x="7" y="7" width="10" height="10"></rect></svg>
            </button>
          </div>
          
          <button id="search-btn">Search</button>

          <div id="scanner-container" class="scanner-container hidden">
            <div id="reader"></div>
            <button id="stop-scan-btn" class="card-btn stop-scan-btn">Cancel Scan</button>
          </div>
        </div>
      </div>
      
      <div id="search-results-container" class="search-results-list"></div>
    </section>

    <section id="view-stats" class="page-view">
      
      <div id="stats-dashboard">
        <div class="hero-wrapper">
          <h2 class="section-label">Your Stats</h2>
          <select id="stats-timefilter" class="card-input" style="margin-top: 10px;">
            <option value="year">This Year</option>
            <option value="month">This Month</option>
            <option value="all">All Time</option>
          </select>
        </div>
        
        <div class="stats-grid">
          <div class="stat-box" id="active-stat-box" title="View Current Reads">
            <h3 id="stat-active">0</h3>
            <p>Active Reads</p>
          </div>
          <div class="stat-box" id="completed-stat-box" title="View Completed Books">
            <h3 id="stat-yearly">0</h3>
            <p>Books Read</p>
          </div>
        </div>

        <div class="hero-wrapper" style="margin-top: 20px;">
          <h2 class="section-label">Top Categories</h2>
          <ul id="stat-categories" class="category-list"></ul>
        </div>
      </div>

      <div id="stats-list-view" class="hidden" style="padding: 0 15px;">
        <div style="display: flex; align-items: center; gap: 15px; margin: 15px 0 20px 0;">
          <button id="close-stats-list" class="icon-action-btn" style="background: transparent; border: 1px solid (--detail-line); border-radius: 50%; color: var(--terracotta);">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
          </button>
          <h2 id="stats-list-title" class="section-label" style="margin: 0; color: var(--text-dark);">List Title</h2>
        </div>
        
        <div id="stats-list-container" class="search-results-list"></div>
      </div>

    </section>

    <section id="view-focus" class="page-view">
      <div class="focus-container">
        <button id="focus-close-btn" class="focus-close">✕</button>
        
        <img src="focus.gif" alt="Reading peacefully" class="focus-bg">
        
        <div class="timer-overlay" id="timer-toggle">
          <div class="timer-display" id="timer-display">20:00</div>
          
          <div class="timer-controls">
            <button id="play-pause-btn" class="icon-action-btn" title="Start/Pause Timer">
              <svg id="play-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
              <svg id="pause-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="none" style="display:none;"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
            </button>
            
            <div class="native-select-wrapper">
              <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="clock-icon"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
              
              <select id="focus-duration" class="hidden-native-select">
                <option value="5">5 Sec (Test)</option>
                <option value="900">15 Minutes</option>
                <option value="1200" selected>20 Minutes</option>
                <option value="1800">30 Minutes</option>
                <option value="2700">45 Minutes</option>
                <option value="3600">1 Hour</option>
              </select>
            </div>
          </div>
        </div>
      </div>
    </section>

  </main>

  <div id="wander-sheet" class="bottom-sheet" style="height: max-content; padding-bottom: max(env(safe-area-inset-bottom), 30px);">
    <div class="sheet-handle"></div>
    <div class="card-detail-container">
      <div class="card-header-line"></div>
      <div class="punch-hole"></div>
      
      <h3 style="font-family: 'Courier New', Courier, monospace; color: var(--terracotta); margin: 10px 0 20px 0; text-align: center;">
        Wander Your Stacks
      </h3>

      <div class="quick-filters">
        <button class="quick-btn" data-status="1" data-sort="date_started_desc">Current Reads</button>
        <button class="quick-btn" data-status="0" data-sort="date_added_desc">TBR List</button>
        <button class="quick-btn" data-status="2" data-sort="date_finished_desc">Finished</button>
        <button class="quick-btn" data-status="3" data-sort="date_added_desc">Gave Up</button>
      </div>

      <div class="red-line"></div>
      
      <div class="toolbar-input-wrapper" style="margin-bottom: 15px; position: relative;">
        <svg class="toolbar-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <input type="text" id="local-search" class="toolbar-input with-icon" style="border: 1px solid var(--detail-line); padding-right: 35px;" placeholder="Search title or author...">
        
        <button id="clear-search-btn" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--sage-green); padding: 0; cursor: pointer; display: none;">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>

      <div class="toolbar-filters" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <select id="filter-status" class="custom-select-btn">
          <option value="all">All Statuses</option>
          <option value="1">Current Reads</option>
          <option value="0">TBR List</option>
          <option value="2">Finished</option>
          <option value="3">Gave Up</option>
        </select>
        
        <select id="sort-library" class="custom-select-btn">
          <option value="title_asc" selected>Title (A-Z)</option>
          <option value="author_asc">Author (A-Z)</option>
          <option value="date_added_desc">Date Added</option>
          <option value="date_started_desc">Date Started</option>
          <option value="date_finished_desc">Date Finished</option>
        </select>
      </div>

      <div style="display: flex; gap: 10px; margin-top: 25px;">
        <button id="apply-wander-btn" style="flex: 2; background-color: var(--terracotta); color: var(--header-text); display: flex; align-items: center; justify-content: center; gap: 8px; border: none; padding: 12px; border-radius: 8px; font-family: 'Courier New', Courier, monospace; font-size: 16px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="4" y="9" width="16" height="4" rx="1" transform="rotate(-12 12 11)" />
            <rect x="4" y="14" width="16" height="4" rx="1" />
            <rect x="4" y="4" width="16" height="4" rx="1" transform="rotate(8 12 6)" />
          </svg>
          Wander
        </button>
      </div>

       <div style="display: flex; gap: 10px; margin-top: 25px;"> 
        <button id="clear-wander-btn" style="flex: 1; background-color: transparent; color: var(--terracotta); border: 1px solid var(--terracotta); display: flex; align-items: center; justify-content: center; gap: 6px; padding: 12px; border-radius: 8px; font-family: 'Courier New', Courier, monospace; font-size: 15px; font-weight: bold; cursor: pointer;">
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"></path></svg>
          Clear
        </button>
      </div>

    </div>
  </div>
  
  <div class="bottom-sheet">
    <div class="sheet-handle"></div>
    <div class="card-content">
      <div class="card-hole"></div>
      
      <div class="card-header">
        <h2 class="book-title"></h2>
        <p class="book-author"></p>
      </div>

      <div class="red-line"></div>

      <div class="detail-lines">
        <div class="metadata-row">
          <span class="meta-label">Category:</span>
          <p class="metadata" data-field="category"></p>
        </div>

        <div class="metadata-row">
          <span class="meta-label">Status:</span>
          <select id="status-dropdown" class="card-select">
            <option value="0">Waiting</option>
            <option value="1">Reading</option>
            <option value="2">Finished</option>
            <option value="3">Gave up</option>
          </select>
        </div>

        <div class="metadata-row">
          <span class="meta-label">Rating:</span>
          <div class="star-rating" id="star-rating">
            <span class="star" data-value="1">★</span>
            <span class="star" data-value="2">★</span>
            <span class="star" data-value="3">★</span>
            <span class="star" data-value="4">★</span>
            <span class="star" data-value="5">★</span>
          </div>
        </div>

        <div class="metadata-row">
          <span class="meta-label">Added:</span>
          <p class="metadata" data-field="date-added"></p>
        </div>
      </div>

      <div class="card-footer-actions">
        <button id="refresh-data-btn" class="icon-action-btn" title="Refresh Data from Google">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"></path>
            <path d="M21 3v5h-5"></path>
          </svg>
        </button>
      </div>

      <div class="card-footer">
        <div class="vintage-stamp" id="completion-stamp">
          <span class="stamp-text">FINISHED</span>
          <span class="stamp-date" id="stamp-date"></span>
        </div>
      </div>
    </div>
  </div>

  <button class="fab" id="top-fab">↑</button>
  
  <nav class="bottom-nav">
    <button class="nav-item active" data-target="view-library" title="Library">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"></path></svg>
    </button>
    <button class="nav-item" data-target="view-search" title="Search">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
    </button>
    <button class="nav-item" data-target="view-stats" title="Stats">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
    </button>
    <button class="nav-item" data-target="view-focus" title="Focus Mode">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8h1a4 4 0 0 1 0 8h-1"></path><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"></path><line x1="6" y1="1" x2="6" y2="4"></line><line x1="10" y1="1" x2="10" y2="4"></line><line x1="14" y1="1" x2="14" y2="4"></line></svg>
    </button>
  </nav>

</body>
</html>
