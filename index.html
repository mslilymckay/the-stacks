<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Tracker</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <script src="app.js" defer></script>
</head>
<body>
  <div class="botanical-frame top-left"></div>
  <div class="botanical-frame top-right"></div>

  <main class="bookshelf">
    </main>

  <div class="bottom-sheet open">
    <div class="sheet-handle"></div>
    <div class="card-content">
      <div class="card-hole"></div>
      <h2 class="book-title">Serve It Forth</h2>
      <p class="book-author">M. F. K. Fisher</p>
      <div class="red-line"></div>
      <div class="blue-lines">
        <p class="metadata">Category: Cooking</p>
        <p class="metadata">Rating: 4 Stars</p>
        <p class="metadata">Status: Completed</p>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-item active">Library</button>
    <button class="nav-item">Search</button>
    <button class="nav-item">Focus</button>
  </nav>
</body>
</html>
