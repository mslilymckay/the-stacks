<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Tracker</title>
  <link rel="stylesheet" href="style.css?v=2">
  <link rel="manifest" href="manifest.json">
  <script type="module" src="app.js" defer></script>
</head>
<body>
  <div class="botanical-frame top-left"></div>
  <div class="botanical-frame top-right"></div>

  <main class="bookshelf">
    
    <section id="view-library" class="page-view active">
      <div class="hero-wrapper">
        <h2 class="section-label">Current Read</h2>
        <div class="current-read-section" id="current-read-section">
  
          <div class="book-cover active-read">
            <img src="https://placehold.co/150x200?text=Loading..." alt="Current Read" class="cover-image">
          </div>
          
          <div class="book-cover" id="reader-toggle">
            <img src="focus.gif" alt="Reading peacefully" class="cover-image">
            <h3 class="cover-title">Let's Read</h3>
            <p class="cover-author">Tap to enter focus mode</p>
          </div>

        </div>
      </div>
    
      <hr class="shelf-divider">
      
      <h2 class="section-label" style="padding: 0 15px;">Library</h2>
      <div class="book-grid" id="book-grid">
        </div>
    </section>

    <section id="view-search" class="page-view">
      <div class="hero-wrapper">
        <h2 class="section-label">Find a Book</h2>
        <div class="search-bar-container">
          <select id="search-type">
            <option value="intitle:">Title</option>
            <option value="inauthor:">Author</option>
          </select>
          <input type="text" id="search-input" placeholder="Search...">
          <button id="search-btn">Search</button>
        </div>
      </div>
      
      <div id="search-results-container" class="search-results-list"></div>
    </section>

    <section id="view-focus" class="page-view">
      <div class="hero-wrapper">
        <h2 class="section-label">Reading Stats</h2>
      </div>
      <p style="padding: 15px; text-align: center; color: var(--sage-green);">Focus mode and stats coming in Batch 5!</p>
    </section>

  </main>
  
  <div class="bottom-sheet">
    <div class="sheet-handle"></div>
    <div class="card-content">
      <div class="card-hole"></div>
      
      <div class="card-split">
        <div class="card-left">
          <div class="vintage-stamp" id="completion-stamp">
            <span class="stamp-text">FINISHED</span>
            <span class="stamp-date" id="stamp-date"></span>
          </div>
        </div>
        
        <div class="card-right">
          <h2 class="book-title"></h2>
          <p class="book-author"></p>
          <div class="red-line"></div>
          <div class="blue-lines">
            <p class="metadata" data-field="category"></p>
            <p class="metadata" data-field="rating"></p>
            <p class="metadata" data-field="isbn"></p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <button class="fab" id="top-fab">↑</button>
  
  <nav class="bottom-nav">
    <button class="nav-item active" data-target="view-library">Library</button>
    <button class="nav-item" data-target="view-search">Search</button>
    <button class="nav-item" data-target="view-stats">Stats</button>
  </nav>

</body>
</html>
