<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Tracker</title>
  <link rel="stylesheet" href="style.css?v=2">
  <link rel="manifest" href="manifest.json">
  <script type="module" src="app.js" defer></script>
</head>
<body>
  <div class="botanical-frame top-left"></div>
  <div class="botanical-frame top-right"></div>

  <main class="bookshelf">
    
    <section id="view-library" class="page-view active">
      <div class="hero-wrapper">
        <h2 class="section-label">Current Read</h2>
        <div class="current-read-section" id="current-read-section">
  
          <div class="book-cover active-read">
            <img src="https://placehold.co/150x200?text=Loading..." alt="Current Read" class="cover-image">
          </div>
         
        </div>
      </div>
    
      <hr class="shelf-divider">
      
      <h2 class="section-label" style="padding: 0 15px;">Library</h2>
      <div class="book-grid" id="book-grid">
        </div>
    </section>

    <section id="view-search" class="page-view">
      <div class="hero-wrapper">
        <h2 class="section-label">Find a Book</h2>
        <div class="search-form-container">
          <div class="search-radio-group">
            <label><input type="radio" name="search-type" value="intitle:" checked> Title</label>
            <label><input type="radio" name="search-type" value="inauthor:"> Author</label>
          </div>
          <input type="text" id="search-input" placeholder="Search by title, author, or ISBN...">
          <button id="search-btn">Search</button>
        </div>
      </div>
      
      <div id="search-results-container" class="search-results-list"></div>
    </section>

    <section id="view-stats" class="page-view">
      <div class="hero-wrapper" style="display: flex; justify-content: space-between; align-items: center;">
        <h2 class="section-label" style="margin-bottom: 0;">Reading Stats</h2>
        <select id="stats-timefilter" style="padding: 5px 10px; border-radius: 4px; border: 1px solid var(--line-blue); background-color: var(--card-bg); font-family: 'Courier New', Courier, monospace; color: var(--sage-green);">
          <option value="month">This Month</option>
          <option value="year" selected>This Year</option>
          <option value="all">All Time</option>
        </select>
      </div>
      
      <div class="stats-container">
        <div class="stat-card">
          <h3 id="stat-active">0</h3>
          <p>Active Reads</p>
        </div>
        <div class="stat-card">
          <h3 id="stat-yearly">0</h3>
          <p>Books Read This Year</p>
        </div>
        <div class="stat-card full-width">
          <h3>Top Categories</h3>
          <ul id="stat-categories" class="category-list">
            <li>Loading...</li>
          </ul>
        </div>
      </div>
    </section>

    <section id="view-focus" class="page-view">
      <div class="focus-container">
        <button id="focus-close-btn" class="focus-close">✕</button>
        
        <img src="focus.gif" alt="Reading peacefully" class="focus-bg">
        
        <div class="timer-overlay" id="timer-toggle">
          <div class="timer-display" id="timer-display">20:00</div>
          <p class="timer-subtitle" id="timer-subtitle">Tap to adjust</p>
        </div>
        
        <div class="duration-picker hidden" id="duration-picker">
          <label for="focus-duration" class="meta-label" style="text-align: center; width: 100%; margin-bottom: 5px;">Set Time:</label>
          <select id="focus-duration" class="card-select">
            <option value="15">15 Minutes</option>
            <option value="20" selected>20 Minutes</option>
            <option value="30">30 Minutes</option>
            <option value="45">45 Minutes</option>
            <option value="60">1 Hour</option>
          </select>
          <div style="display: flex; gap: 10px; margin-top: 15px;">
            <button id="cancel-timer-btn" class="card-btn" style="border-color: var(--sage-green); color: var(--sage-green); flex: 1;">Cancel</button>
            <button id="start-timer-btn" class="card-btn" style="background: var(--terracotta); border-color: var(--terracotta); color: white; flex: 1;">Start</button>
          </div>
        </div>
      </div>
    </section>

  </main>
  
  <div class="bottom-sheet">
    <div class="sheet-handle"></div>
    <div class="card-content">
      <div class="card-hole"></div>
      
      <div class="card-header">
        <h2 class="book-title"></h2>
        <p class="book-author"></p>
      </div>

      <div class="red-line"></div>

      <div class="blue-lines">
        <div class="metadata-row">
          <span class="meta-label">Category:</span>
          <p class="metadata" data-field="category"></p>
        </div>

        <div class="metadata-row">
          <span class="meta-label">Status:</span>
          <select id="status-dropdown" class="card-select">
            <option value="0">Waiting</option>
            <option value="1">Reading</option>
            <option value="2">Finished</option>
            <option value="3">Gave up</option>
          </select>
        </div>

        <div class="metadata-row">
          <span class="meta-label">Rating:</span>
          <div class="star-rating" id="star-rating">
            <span class="star" data-value="1">★</span>
            <span class="star" data-value="2">★</span>
            <span class="star" data-value="3">★</span>
            <span class="star" data-value="4">★</span>
            <span class="star" data-value="5">★</span>
          </div>
        </div>

        <div class="metadata-row">
          <span class="meta-label">Added:</span>
          <p class="metadata" data-field="date-added"></p>
        </div>
      </div>

      <div class="card-footer-actions">
        <button id="refresh-data-btn" class="icon-action-btn" title="Refresh Data from Google">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"></path>
            <path d="M21 3v5h-5"></path>
          </svg>
        </button>
      </div>

      <div class="card-footer">
        <div class="vintage-stamp" id="completion-stamp">
          <span class="stamp-text">FINISHED</span>
          <span class="stamp-date" id="stamp-date"></span>
        </div>
      </div>
    </div>
  </div>

  <button class="fab" id="top-fab">↑</button>
  
  <nav class="bottom-nav">
    <button class="nav-item active" data-target="view-library" title="Library">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"></path></svg>
    </button>
    <button class="nav-item" data-target="view-search" title="Search">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
    </button>
    <button class="nav-item" data-target="view-stats" title="Stats">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
    </button>
    <button class="nav-item" data-target="view-focus" title="Focus Mode">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8h1a4 4 0 0 1 0 8h-1"></path><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"></path><line x1="6" y1="1" x2="6" y2="4"></line><line x1="10" y1="1" x2="10" y2="4"></line><line x1="14" y1="1" x2="14" y2="4"></line></svg>
    </button>
  </nav>

</body>
</html>
